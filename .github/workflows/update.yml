name: อัปเดตผลหวยลาว

on:
  schedule:
    - cron: '0 15 * * *'   # 22:00 เวลาไทย (UTC+7) ทุกวัน — หลังหวยออก
  workflow_dispatch:        # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write

concurrency:
  group: update-lao
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ติดตั้ง dependency
        run: pip install openpyxl

      - name: ดึงผลหวยลาวล่าสุด
        run: python tools/fetch_history.py

      - name: commit + push ถ้ามีงวดใหม่
        run: |
          if git diff --quiet -- lao_history.json; then
            echo "ไม่มีงวดใหม่ — ข้าม"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lao_history.js lao_history.json lao_history.csv lao_history.xlsx
          git commit -m "อัปเดตผลหวยลาวอัตโนมัติ $(date -u +%Y-%m-%d)"
          git push
