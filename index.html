<html lang="th">
<head>
<meta charset="utf-8">

  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Sarabun',sans-serif;color:#2c2740;-webkit-font-smoothing:antialiased}

<body>
<div id="root"></div>
<!-- ประวัติผลหวยจริง (สร้างจาก tools/fetch_history.py + tools/fetch_hanoi.py) -->
<script src="lao_history.js"></script>
<script src="hanoi_history.js"></script>
<script>
"use strict";

/* ---------- tiny DOM helper ---------- */
function el(tag, opts, children){
  const node = document.createElement(tag);
  opts = opts || {};
  if(opts.style) Object.assign(node.style, opts.style);
  if(opts.class) node.className = opts.class;
  if(opts.onClick) node.addEventListener('click', opts.onClick);
  if(opts.onChange) node.addEventListener('change', opts.onChange);
  for(const k in opts){
    if(['style','class','onClick','onChange'].includes(k)) continue;
    if(k === 'html'){ node.innerHTML = opts[k]; continue; }
    node.setAttribute(k, opts[k]);
  }
  if(children != null){
    (Array.isArray(children) ? children : [children]).forEach(c=>{
      if(c == null || c === false) return;
      node.appendChild(typeof c === 'object' ? c : document.createTextNode(String(c)));
    });
  }
  return node;
}

/* ============================================================
   เลขดี — วิเคราะห์ "หวยลาว" จากสถิติย้อนหลัง (หน้าเดียว)
   ข้อมูลจริงดึงจาก Sanook ผ่าน CORS proxy ฟรี เก็บใน localStorage
   ============================================================ */
const App = {
  state: {
    windowSize:30,
    dateFrom:'2025-01-01', dateTo:new Date().toISOString().slice(0,10),
    preset:'all', side:'top',
    openCal:null, calMonth:0,  // custom dd/mm/yyyy date picker
    view:'home',               // 'home' | 'analyze' | 'table' | 'backtest'
    lottery:'lao'              // หวยที่เลือก
  },
  theme:'pastel',

  /* หวยที่รองรับ (ลาว + ฮานอย 4 ประเภท) */
  LOTTERIES: [
    { id:'lao',          name:'หวยลาว',        hue:188 }, // เทอร์ควอยซ์
    { id:'hanoi',        name:'ฮานอย',         hue:296 }, // ม่วง-แมเจนทา
    { id:'hanoiSpecial', name:'ฮานอยพิเศษ',    hue:242 }, // อินดิโก
    { id:'hanoiVip',     name:'ฮานอย VIP',     hue:338 }, // โรสพิงก์
    { id:'hanoiTask',    name:'ฮานอยเฉพาะกิจ', hue:215 }, // ฟ้า-azure
  ],
  HANOI_KEYS: ['hanoi','hanoiSpecial','hanoiVip','hanoiTask'],
  lot(){ return this.LOTTERIES.find(x=>x.id===this.state.lottery) || this.LOTTERIES[0]; },
  TM: ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'],

  /* live-update state */
  _mock:null, _real:null, _seed:null, lastUpd:null, updating:false, updateStatus:'', updateOk:null,

  setState(patch){ Object.assign(this.state, patch); render(); },
  selectLottery(id){ this.state.lottery=id; this.state.openCal=null; this.applyPreset('all'); },

  /* ---- mock สำรอง (เฉพาะลาว กรณีไม่มี seed) ---- */
  mul(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; },
  g(rng,c,s){ let v; if(rng()<0.12) v=Math.floor(rng()*100); else v=Math.round(c+(rng()+rng()+rng()-1.5)*s*1.35); return Math.max(0,Math.min(99,v)); },
  _ensure(){
    if(this._seed) return;
    const rng=this.mul(1011); const mock=[]; const start=new Date(2025,0,1), end=new Date();
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)) mock.push({ts:d.getTime(),top:this.g(rng,46,13),bottom:this.g(rng,54,12)});
    this._mock=mock;
    this.loadSeed(); this.loadReal();
  },

  /* ---- ข้อมูลในตัว (seed) ต่อหวย ---- */
  loadSeed(){
    if(this._seed) return;
    const s={ lao: Array.isArray(window.LAO_HISTORY) ? window.LAO_HISTORY.slice() : [] };
    const H=window.HANOI_HISTORY||{};
    for(const k of this.HANOI_KEYS) s[k]=Array.isArray(H[k])?H[k].slice():[];
    this._seed=s;
  },

  /* ---- real data layer (localStorage) — เก็บแยกต่อหวย ---- */
  STORE_KEY:'legdee_real_v4',
  loadReal(){
    try{ const o=JSON.parse(localStorage.getItem(this.STORE_KEY)||'{}'); this._real=o.real||{}; this.lastUpd=o.lastUpd||{}; }
    catch(e){ this._real={}; this.lastUpd={}; }
  },
  saveReal(){ try{ localStorage.setItem(this.STORE_KEY, JSON.stringify({real:this._real,lastUpd:this.lastUpd})); }catch(e){} },
  ymd(ts){ const d=new Date(ts); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); },
  mergeReal(list, id){
    const cur=this._real[id]||[]; const byDay={};
    for(const d of cur) byDay[this.ymd(d.ts)]=d;
    for(const d of list) byDay[this.ymd(d.ts)]={ts:d.ts,top:d.top,bottom:d.bottom};
    this._real[id]=Object.values(byDay).sort((a,b)=>a.ts-b.ts);
  },
  isReal(id){ id=id||this.state.lottery; return ((this._seed[id]||[]).length>0)||((this._real[id]||[]).length>0); },
  draws(id){
    id=id||this.state.lottery;
    const seed=this._seed[id]||[], real=this._real[id]||[];
    if(!seed.length && !real.length) return id==='lao'? this._mock : [];
    const byDay={};
    for(const d of seed) byDay[this.ymd(d.ts)]=d;
    for(const d of real) byDay[this.ymd(d.ts)]=d; // ผลที่กดอัปเดตใหม่ทับของในตัว
    return Object.values(byDay).sort((a,b)=>a.ts-b.ts);
  },

  /* ---- stats helpers ---- */
  pad(n){ return String(n).padStart(2,'0'); },
  thai(ts){ const x=new Date(ts); return x.getDate()+' '+this.TM[x.getMonth()]+' '+(x.getFullYear()+543); },
  short(ts){ const x=new Date(ts); return x.getDate()+' '+this.TM[x.getMonth()]; },
  cnt(draws,side){ const a=new Array(100).fill(0); for(let i=0;i<draws.length;i++) a[draws[i][side]]++; return a; },
  pre(a){ const p=new Array(101).fill(0); for(let i=0;i<100;i++) p[i+1]=p[i]+a[i]; return p; },
  cov(p,total,w){ let best={s:0,p:-1}; const pts=[]; const end=100-w; for(let s=0;s<=end;s++){ const c=p[s+w]-p[s]; const pr=total?c/total:0; pts.push(pr); if(pr>best.p) best={s,p:pr}; } return {pts,best}; },
  lab(s,w){ return this.pad(s)+'–'+this.pad(s+w-1); },
  pl(p){ return Math.round(p*100)+'%'; },
  conf(p){ return p>=0.6?'มั่นใจสูงมาก':p>=0.5?'มั่นใจสูง':p>=0.42?'ปานกลาง':'พอใช้'; },
  colorFor(hue){
    // design tokens (pastel): [L_accent,C_accent, L_deep,C_deep, L_soft,C_soft]
    const t=[0.72,0.12, 0.54,0.16, 0.965,0.03];
    return {
      accent:`oklch(${t[0]} ${t[1]} ${hue})`,
      deep:`oklch(${t[2]} ${t[3]} ${hue})`,
      soft:`oklch(${t[4]} ${t[5]} ${hue})`,
      hue
    };
  },
  dataRange(){ const a=this.draws(); return a.length ? {min:new Date(a[0].ts), max:new Date(a[a.length-1].ts)} : {min:new Date(2025,0,1), max:new Date()}; },
  _iso(d){ const z=new Date(d.getTime()-d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); },
  applyPreset(k){
    const {min,max}=this.dataRange(); let start;
    if(k==='all') start=min;
    else { const days=k==='6m'?180:k==='3m'?90:30; start=new Date(max.getTime()-days*86400000); if(start<min) start=min; }
    this.setState({ preset:k, dateFrom:this._iso(start), dateTo:this._iso(max) });
  },
  yearsInData(){ const {min,max}=this.dataRange(); const out=[]; for(let y=min.getFullYear(); y<=max.getFullYear(); y++) out.push(y); return out; },
  applyYear(ceYear){
    const {min,max}=this.dataRange();
    let start=new Date(ceYear,0,1), end=new Date(ceYear,11,31,23,59,59);
    if(start<min) start=min; if(end>max) end=max;
    this.setState({ preset:'year:'+ceYear, dateFrom:this._iso(start), dateTo:this._iso(end) });
  },
  clearFilters(){ this.state.windowSize=30; this.applyPreset('all'); },

  /* ---- backtest: ทำนายแต่ละงวดจากข้อมูลก่อนหน้า แล้วเทียบผลจริง ---- */
  backtest(size, fromTs, toTs){
    const all=this.draws(); const rows=[]; let hitT=0,hitB=0,nT=0,nB=0;
    const ct=new Array(100).fill(0), cb=new Array(100).fill(0);
    for(let i=0;i<all.length;i++){
      const d=all[i];
      if(i>=20 && d.ts>=fromTs && d.ts<toTs){
        const aT=this.cov(this.pre(ct),i,size).best, aB=this.cov(this.pre(cb),i,size).best;
        const okT=d.top>=aT.s && d.top<aT.s+size, okB=d.bottom>=aB.s && d.bottom<aB.s+size;
        rows.push({ ts:d.ts, pTop:[aT.s,aT.s+size-1], aTop:d.top, okT, pBot:[aB.s,aB.s+size-1], aBot:d.bottom, okB });
        nT++; if(okT)hitT++; nB++; if(okB)hitB++;
      }
      ct[d.top]++; cb[d.bottom]++;
    }
    return { rows, accT:nT?hitT/nT:0, accB:nB?hitB/nB:0, hitT, hitB, nT, nB };
  },

  /* ---- live update: ยิงหลาย proxy พร้อมกัน เอาอันที่เร็วสุดที่สำเร็จ ---- */
  laoUrl(){ const d=new Date(); return 'https://www.sanook.com/news/laolotto/'+this.pad(d.getDate())+this.pad(d.getMonth()+1)+(d.getFullYear()+543)+'/'; },
  hanoiUrl(){ return 'https://www.sanook.com/news/9837690/'; },
  parseLao(html){
    const re=/"dateSlug\\?":\\?"(\d{2})(\d{2})(\d{4})"[\s\S]{0,400}?"last4Prize\\?":\\?"(\d{4})"/g;
    const out=[]; const seen={}; let m;
    while((m=re.exec(html))){
      const key=m[1]+m[2]+m[3]; if(seen[key]) continue; seen[key]=1;
      const dd=+m[1], mm=+m[2], be=+m[3], n4=+m[4];
      const ts=new Date(be-543, mm-1, dd).getTime();
      out.push({ ts, top:n4%100, bottom:Math.floor(n4/100) });
    }
    return out;
  },
  parseHanoi(raw){
    const text=raw.replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/gi,' ').replace(/\s+/g,' ');
    const TYPES={'ปกติ':'hanoi','พิเศษ':'hanoiSpecial','vip':'hanoiVip','เฉพาะกิจ':'hanoiTask'};
    const dmarks=[]; let dm; const dre=/หวยฮานอย\s*(\d{1,2})\/(\d{1,2})\/(\d{2,4})/g;
    while((dm=dre.exec(text))) dmarks.push([dm.index,+dm[1],+dm[2],+dm[3]]);
    const out={hanoi:[],hanoiSpecial:[],hanoiVip:[],hanoiTask:[]}; const seen={};
    const bre=/ผลหวยฮานอย([฀-๿a-zA-Z ]{0,14}?)\s*(?:เลข\s*4\s*ตัว\s*:\s*\d+\s*)?เลข\s*3\s*ตัวบน\s*:\s*\d{3}\s*เลข\s*2\s*ตัวบน\s*:\s*(\d{2})\s*เลข\s*2\s*ตัวล่าง\s*:\s*(\d{2})/g;
    let m;
    while((m=bre.exec(text))){
      let nm=m[1].trim(); const key=TYPES[nm.toLowerCase()==='vip'?'vip':nm]; if(!key) continue;
      let dd=null; for(const x of dmarks){ if(x[0]<=m.index) dd=x; else break; } if(!dd) dd=dmarks[0]; if(!dd) continue;
      let y=dd[3]<100?dd[3]+2500:dd[3]; const ce=y-543; const ts=Date.UTC(ce,dd[2]-1,dd[1]);
      const k=key+'|'+this.ymd(ts); if(seen[k]) continue; seen[k]=1;
      out[key].push({ ts, top:+m[2], bottom:+m[3] });
    }
    return out;
  },
  async fetchProxied(url){
    const sources=[
      { u:'https://api.allorigins.win/raw?url='+encodeURIComponent(url) },
      { u:'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(url) },
      { u:'https://corsproxy.io/?url='+encodeURIComponent(url) },
      { u:'https://api.allorigins.win/get?url='+encodeURIComponent(url), json:true },
      { u:'https://thingproxy.freeboard.io/fetch/'+url },
      { u:'https://test.cors.workers.dev/?'+url },
    ];
    const tryOne=(s)=>{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),10000);
      return fetch(s.u,{signal:ctrl.signal}).then(async r=>{
        clearTimeout(tid);
        if(!r.ok) throw new Error('HTTP '+r.status);
        const t = s.json ? ((await r.json()).contents||'') : await r.text();
        if(!t || t.length<800) throw new Error('empty');
        return t;
      }, e=>{ clearTimeout(tid); throw e; });
    };
    return Promise.any(sources.map(tryOne));
  },
  async update(){
    if(this.updating) return;
    this._ensure();
    const id=this.state.lottery;
    this.updating=true; this.updateStatus=''; this.updateOk=null; render();
    try{
      if(id==='lao'){
        const list=this.parseLao(await this.fetchProxied(this.laoUrl()));
        if(list.length){ this.mergeReal(list,'lao'); this.lastUpd.lao=Date.now(); this.saveReal(); this.updateOk=true;
          this.updateStatus='ดึงสำเร็จ • ผลล่าสุด '+list.length+' งวด (ข้อมูลทั้งหมด '+this.draws('lao').length+' งวด)'; }
        else { this.updateOk=false; this.updateStatus='เชื่อมต่อได้ แต่ยังอ่านผลไม่ได้ — ลองใหม่อีกครั้ง'; }
      } else {
        const all=this.parseHanoi(await this.fetchProxied(this.hanoiUrl()));
        for(const k of this.HANOI_KEYS){ if(all[k]&&all[k].length){ this.mergeReal(all[k],k); this.lastUpd[k]=Date.now(); } }
        const n=(all[id]||[]).length;
        if(n){ this.saveReal(); this.updateOk=true;
          this.updateStatus='ดึงสำเร็จ • อัปเดตฮานอยทุกประเภท (ล่าสุด '+n+' งวด, รวม '+this.draws(id).length+' งวด)'; }
        else { this.updateOk=false; this.updateStatus='เชื่อมต่อได้ แต่ยังอ่านผลไม่ได้ — ลองใหม่อีกครั้ง'; }
      }
    }catch(e){
      this.updateOk=false; this.updateStatus='ดึงไม่สำเร็จ — เน็ต/พร็อกซีอาจไม่ว่าง ลองกดใหม่อีกครั้งสักครู่';
    }
    this.updating=false; render();
  },
};

/* ============================================================
   Render — หน้าเดียว (หวยลาว)
   ============================================================ */
function render(){
  App._ensure();
  const A = App;
  const C = (h)=>A.colorFor(h);
  const size = A.state.size||A.state.windowSize, side = A.state.side;
  const todayISO = new Date().toISOString().slice(0,10);
  // บน = สีหวย, ล่าง = hue +16 (แผง/heatmap) / +46 (ตารางสถิติ)
  const l = A.lot(), c = C(l.hue), cT = c, c2 = C(l.hue+16), cStat2 = C(l.hue+46);
  const ink='#2c2740', sub='#7c7690';
  const bg='linear-gradient(180deg,#FAF7FF 0%,#F4FBFA 100%)'; // พื้นหลังพาสเทลคงที่
  const brandBg=`linear-gradient(135deg, ${C(288).deep}, ${C(330).deep})`;

  const root = document.getElementById('root');
  root.innerHTML='';
  const outer = el('div',{style:{minHeight:'100vh',background:bg}});
  const wrap = el('div',{style:{maxWidth:'920px',margin:'0 auto',padding:'18px 16px 72px'}});
  outer.appendChild(wrap); root.appendChild(outer);

  /* ---------- Top bar: แบรนด์ + ปุ่มอัปเดต ---------- */
  const brand = el('div',{style:{display:'flex',alignItems:'center',gap:'11px'}},[
    el('div',{style:{width:'40px',height:'40px',borderRadius:'13px',display:'grid',placeItems:'center',fontSize:'19px',color:'#fff',background:brandBg,boxShadow:'0 6px 16px rgba(120,90,220,.26)'}},'✦'),
    el('div',{},[
      el('div',{style:{fontWeight:'600',fontSize:'17px',lineHeight:'1.05'}},'เลขดี'),
      el('div',{style:{fontSize:'11px',color:'#9b94ad',letterSpacing:'.03em'}},'วิเคราะห์หวยลาว/ฮานอยจากสถิติ'),
    ]),
  ]);
  const updBtn = el('button',{style:{display:'inline-flex',alignItems:'center',gap:'7px',padding:'9px 17px',borderRadius:'999px',border:'none',cursor:A.updating?'default':'pointer',fontWeight:'600',fontSize:'13px',background:c.deep,color:'#fff',opacity:A.updating?'.7':'1',transition:'all .15s'},
    onClick:()=>A.update()},[
      el('span',{style:A.updating?{display:'inline-block',animation:'spin .8s linear infinite'}:{}},'⟳'),
      el('span',{},A.updating?'กำลังดึงผล…':'อัปเดตผลจริง'),
  ]);
  wrap.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'14px',flexWrap:'wrap',marginBottom:'10px'}},[brand,updBtn]));

  /* ---------- เมนู: หน้าแรก + เลือกหวย ---------- */
  const onHome=A.state.view==='home';
  const navPill=(label,active,col,onClick)=>el('button',{style:{padding:'8px 16px',borderRadius:'999px',fontWeight:'600',fontSize:'13px',cursor:'pointer',whiteSpace:'nowrap',
    border:'1px solid '+(active?col:'rgba(40,30,60,.12)'),background:active?col:'#fff',color:active?'#fff':'#6c6680',transition:'all .15s'},onClick},label);
  wrap.appendChild(el('div',{class:'hscroll',style:{display:'flex',gap:'8px',overflowX:'auto',marginBottom:'12px',paddingBottom:'3px'}},[
    navPill('หน้าแรก', onHome, c.deep, ()=>A.setState({view:'home',openCal:null})),
    ...A.LOTTERIES.map(L=>{ const active=!onHome && A.state.lottery===L.id; const lc=C(L.hue);
      return navPill(L.name, active, lc.deep, ()=>{ if(A.state.view==='home') A.state.view='analyze'; A.selectLottery(L.id); });
    }),
  ]));

  /* ---------- HOME: ผลล่าสุดของทุกหวย ---------- */
  if(onHome){
    const home=el('div',{style:{animation:'pop .35s ease both'}});
    home.appendChild(el('div',{style:{margin:'8px 0 20px'}},[
      el('div',{style:{fontSize:'12px',color:'#9b94ad',marginBottom:'6px'}},'วันนี้ '+A.thai(Date.now())),
      el('h1',{style:{fontWeight:'600',fontSize:'30px',margin:'0 0 8px',lineHeight:'1.14',color:ink}},'ผลหวยล่าสุด & ชุดเลขแนะนำ'),
      el('p',{style:{margin:'0',color:sub,fontSize:'15px',maxWidth:'600px'}},'ผลออกล่าสุดของหวยแต่ละประเภท พร้อมช่วงเลขแนะนำ 30 ตัว — กดการ์ดเพื่อดูวิเคราะห์เต็ม'),
    ]));
    const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:'16px'}});
    A.LOTTERIES.forEach(L=>{
      const dr=A.draws(L.id); if(!dr.length) return;
      const lc=C(L.hue), lc2=C(L.hue+16), last=dr[dr.length-1], tot=dr.length;
      const a=A.cov(A.pre(A.cnt(dr,'top')),tot,30).best, b=A.cov(A.pre(A.cnt(dr,'bottom')),tot,30).best;
      grid.appendChild(el('div',{style:{background:'#fff',borderRadius:'22px',padding:'18px',boxShadow:'0 12px 32px rgba(60,40,100,.06)',border:'1px solid rgba(40,30,60,.05)',display:'flex',flexDirection:'column',gap:'13px'}},[

        el('span',{style:{fontSize:'12px',color:'#9b94ad'}},'→ ออก'),
        el('span',{style:{fontWeight:'700',fontSize:'15px',color:'#2c2740'}},A.pad(actual)),
        hitBadge(ok),
      ]);
      const rows=el('div',{style:{display:'flex',flexDirection:'column'}});
      rows.appendChild(el('div',{class:'an-grid',style:{display:'grid',gridTemplateColumns:'88px 1fr 1fr',gap:'12px',padding:'0 2px 8px',borderBottom:'2px solid rgba(40,30,60,.08)'}},[
        el('div',{style:{fontSize:'11px',color:'#9b94ad',fontWeight:'600'}},'งวด'),
        el('div',{style:{fontSize:'11px',color:'#9b94ad',fontWeight:'600'}},'2 ตัวบน'),
        el('div',{style:{fontSize:'11px',color:'#9b94ad',fontWeight:'600'}},'2 ตัวล่าง'),
      ]));
      bres.rows.slice().reverse().forEach(r=>{
        rows.appendChild(el('div',{class:'an-grid',style:{display:'grid',gridTemplateColumns:'88px 1fr 1fr',gap:'12px',alignItems:'center',padding:'9px 2px',borderBottom:'1px solid rgba(40,30,60,.05)'}},[
          el('div',{style:{fontSize:'13px',fontWeight:'600',color:'#2c2740'}},A.short(r.ts)),
          cell(r.pTop,r.aTop,r.okT,cT), cell(r.pBot,r.aBot,r.okB,c2),
        ]));
      });
      bt.appendChild(el('div',{style:{background:'#fff',borderRadius:'24px',padding:'18px',boxShadow:'0 12px 32px rgba(60,40,100,.06)',border:'1px solid rgba(40,30,60,.05)'}},[rows]));
    } else {
      bt.appendChild(el('div',{style:{background:'#fff',borderRadius:'24px',padding:'30px',textAlign:'center',color:'#9b94ad',boxShadow:'0 12px 32px rgba(60,40,100,.06)'}},'งวดในช่วงนี้น้อยเกินไป (ต้องมีงวดก่อนหน้าอย่างน้อย 20 งวดถึงจะทำนายได้) — ลองขยายช่วงวันที่/เลือก “ทั้งหมด”'));
    }

    bt.appendChild(el('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start',background:'rgba(255,255,255,.55)',border:'1px dashed rgba(40,30,60,.14)',borderRadius:'16px',padding:'14px 16px',fontSize:'12px',color:'#8a8499',lineHeight:'1.6',marginTop:'18px'}},[
      el('span',{},'⚠️'),
      el('span',{},'แต่ละงวดทำนายจากสถิติ “ก่อนหน้างวดนั้น” เท่านั้น (ไม่เห็นอนาคต) แล้วเทียบผลจริง — เป็นการทดสอบย้อนหลังว่ากลยุทธ์ “ช่วงเลขติดกัน” แม่นแค่ไหน • อดีตไม่รับประกันอนาคต'),
    ]));

    wrap.appendChild(bt);
    return;
  }

  const detail = el('div',{style:{animation:'pop .35s ease both'}});

  detail.appendChild(pageHeader('วิเคราะห์ช่วงเลข','ช่วงข้อมูล '+A.thai(fa)+' – '+A.thai(Date.parse(A.state.dateTo))+' • '+total.toLocaleString()+' งวด'+(real?' • Sanook':'')));

  detail.appendChild(filterBar(true));

  /* recommendation panels */
  const mainPanel=(p,cc,label)=>{
    const a=A.cov(p,total,size);
    return el('div',{style:{background:'#fff',borderRadius:'22px',padding:'20px',boxShadow:'0 12px 32px rgba(60,40,100,.06)',border:'1px solid rgba(40,30,60,.05)'}},[
      el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},[
        el('span',{style:{fontWeight:'600',fontSize:'13px',padding:'5px 13px',borderRadius:'999px',background:cc.soft,color:cc.deep}},label),
        el('span',{style:{fontSize:'12px',fontWeight:'600',color:cc.deep}},A.conf(a.best.p)),
      ]),
      el('div',{style:{display:'flex',alignItems:'baseline',gap:'11px',margin:'14px 0 2px'}},[
        el('span',{style:{fontWeight:'600',fontSize:'42px',lineHeight:'1',color:cc.deep}},A.pl(a.best.p)),
        el('span',{style:{fontSize:'13px',color:'#9b94ad'}},'โอกาสถูก ถ้าลง '+size+' ตัว'),
      ]),
      el('div',{style:{fontWeight:'500',fontSize:'21px',margin:'6px 0 12px'}},'แนะนำช่วง '+A.lab(a.best.s,size)),
      el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}},
        Array.from({length:size},(_,i)=>el('span',{style:chip(cc)},A.pad(a.best.s+i)))),
    ]);
  };
  detail.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'16px',marginBottom:'20px'}},[
    mainPanel(pt,cT,'2 ตัวบน'), mainPanel(pb,c2,'2 ตัวล่าง'),
  ]));

  /* size comparison cards */
  detail.appendChild(el('div',{style:{fontSize:'13px',color:'#9b94ad',marginBottom:'9px'}},'เทียบขนาดชุด — ยิ่งซื้อกว้าง โอกาสยิ่งสูง แต่ต้นทุนมากขึ้น (กดเพื่อเลือก)'));
  const sizeCardGrid = el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'12px',marginBottom:'22px'}});
  // การ์ดสีหวยอ่อน อันที่เลือกมีกรอบสี deep (ตามดีไซน์)
  [40,30,20].forEach(w=>{
    const a=A.cov(pt,total,w), b=A.cov(pb,total,w); const active=w===size;
    sizeCardGrid.appendChild(el('div',{style:{background:active?c.soft:'#fff',borderRadius:'18px',padding:'14px',cursor:'pointer',color:'#2c2740',transition:'all .15s',
      boxShadow:active?('0 10px 26px '+c.soft):'0 6px 18px rgba(60,40,100,.05)',
      border:active?('2px solid '+c.deep):'1px solid rgba(40,30,60,.07)'},
      onClick:()=>A.setState({windowSize:w})},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[
        el('span',{style:{fontWeight:'600',fontSize:'18px'}},w+' ตัว'),
        el('span',{style:{fontSize:'11px',fontWeight:'600',padding:'3px 9px',borderRadius:'999px',background:c.soft,color:c.deep}},w===40?'กว้างสุด':w===30?'สมดุล':'ประหยัด'),
      ]),
      el('div',{style:{display:'flex',gap:'12px',marginTop:'12px'}},[
        el('div',{style:{flex:'1'}},[
          el('div',{style:{fontSize:'11px',color:'#a9a2b8'}},'บน '+A.lab(a.best.s,w)),
          el('div',{style:{fontWeight:'600',fontSize:'21px',color:cT.deep}},A.pl(a.best.p)),
        ]),
        el('div',{style:{flex:'1'}},[
          el('div',{style:{fontSize:'11px',color:'#a9a2b8'}},'ล่าง '+A.lab(b.best.s,w)),
          el('div',{style:{fontWeight:'600',fontSize:'21px',color:c2.deep}},A.pl(b.best.p)),
        ]),
      ]),
    ]));
  });
  detail.appendChild(sizeCardGrid);

  /* heatmap + curve */
  {
    const sideC=side==='top'?cT:c2; const cnts=side==='top'?ct:cb; const sp=side==='top'?pt:pb;
    const cv=A.cov(sp,total,size);
    const maxF=Math.max(...cnts,1);
    const heatHue=side==='top'?l.hue:l.hue+16;

    const heatGrid = el('div',{style:{display:'grid',gridTemplateColumns:'repeat(10,1fr)',gap:'4px'}});
    cnts.forEach((f,nn)=>{
      const it=f/maxF; const inWin=nn>=cv.best.s&&nn<cv.best.s+size;
      heatGrid.appendChild(el('div',{style:{aspectRatio:'1',display:'grid',placeItems:'center',fontSize:'11px',fontWeight:inWin?'700':'500',borderRadius:'8px',background:`oklch(${0.97-0.45*it} ${0.012+0.135*it} ${heatHue})`,color:it>0.52?'#fff':'#544c68',boxShadow:inWin?'0 0 0 2px '+sideC.deep+' inset':'none'}},A.pad(nn)));
    });

    const n=cv.pts.length, maxP=Math.max(...cv.pts)||1;
    const X=i=>(n>1?i/(n-1)*100:0), Y=p=>+(42-(p/maxP)*36).toFixed(2);
    const points=cv.pts.map((p,i)=>X(i).toFixed(2)+','+Y(p)).join(' ');
    const area='M0,44 '+cv.pts.map((p,i)=>'L'+X(i).toFixed(2)+','+Y(p)).join(' ')+' L100,44 Z';
    const mLeft=X(cv.best.s), mTop=Y(cv.best.p)/44*100;

    const svgNS='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(svgNS,'svg');
    svg.setAttribute('viewBox','0 0 100 44'); svg.setAttribute('preserveAspectRatio','none');
    svg.style.width='100%'; svg.style.height='120px'; svg.style.display='block';
    const pathEl=document.createElementNS(svgNS,'path');
    pathEl.setAttribute('d',area); pathEl.setAttribute('fill',sideC.soft);
    const poly=document.createElementNS(svgNS,'polyline');
    poly.setAttribute('points',points); poly.setAttribute('fill','none');
    poly.setAttribute('stroke',sideC.deep); poly.setAttribute('stroke-width','1.6');
    poly.style.vectorEffect='non-scaling-stroke';
    svg.appendChild(pathEl); svg.appendChild(poly);

    const marker=el('div',{style:{position:'absolute',left:mLeft+'%',top:mTop+'%',transform:'translate(-50%,-130%)',background:sideC.deep,color:'#fff',fontSize:'11px',fontWeight:'600',padding:'2px 8px',borderRadius:'999px',whiteSpace:'nowrap'}},A.pl(cv.best.p));
    const curveWrap=el('div',{style:{position:'relative'}}); curveWrap.appendChild(svg); curveWrap.appendChild(marker);

    const idx=[...cnts.keys()].sort((a,b)=>cnts[b]-cnts[a]);
    const hot=idx.slice(0,6).map(nn=>el('span',{style:{fontWeight:'600',fontSize:'13px',padding:'4px 10px',borderRadius:'9px',background:sideC.deep,color:'#fff'}},A.pad(nn)));
    const cold=idx.slice(-6).reverse().map(nn=>el('span',{style:{fontWeight:'600',fontSize:'13px',padding:'4px 10px',borderRadius:'9px',background:'#f1eff5',color:'#a39db4'}},A.pad(nn)));

    const sideTabs=[['top','2 ตัวบน'],['bottom','2 ตัวล่าง']].map(([k,label])=>
      el('button',{style:segStyle(side===k,k==='top'?cT:c2),onClick:()=>A.setState({side:k})},label));

    detail.appendChild(el('div',{style:{background:'#fff',borderRadius:'24px',padding:'20px',boxShadow:'0 12px 32px rgba(60,40,100,.06)',border:'1px solid rgba(40,30,60,.05)',marginBottom:'18px'}},[
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'16px'}},[
        el('div',{},[
          el('h3',{style:{fontWeight:'600',fontSize:'18px',margin:'0'}},'แผนที่ความถี่ เลข 00–99'),
          el('div',{style:{fontSize:'12px',color:'#9b94ad',marginTop:'2px'}},'ช่องเข้ม = ออกบ่อย • กรอบสี = ช่วงที่แนะนำ'),
        ]),
        el('div',{style:{display:'flex',gap:'6px'}},sideTabs),
      ]),
      el('div',{class:'an-grid',style:{display:'grid',gridTemplateColumns:'1.08fr .92fr',gap:'24px',alignItems:'start'}},[
        heatGrid,
        el('div',{style:{display:'flex',flexDirection:'column',gap:'18px'}},[
          el('div',{},[
            el('div',{style:{fontSize:'13px',fontWeight:'600',marginBottom:'10px'}},'โอกาสถูกของแต่ละช่วง ('+size+' ตัว)'),
            curveWrap,
            el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#b3adc0',marginTop:'3px'}},[
              el('span',{},'เริ่ม 00'),
              el('span',{style:{color:'#8a8499',fontWeight:'600'}},'จุดสูงสุด '+A.lab(cv.best.s,size)),
              el('span',{},'เริ่ม 99'),
            ]),
          ]),
          el('div',{style:{display:'flex',gap:'14px'}},[
            el('div',{style:{flex:'1'}},[
              el('div',{style:{fontSize:'12px',color:'#9b94ad',marginBottom:'8px'}},'เลขเด่น (ออกบ่อย)'),
              el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}},hot),
            ]),
            el('div',{style:{flex:'1'}},[
              el('div',{style:{fontSize:'12px',color:'#9b94ad',marginBottom:'8px'}},'เลขดับ (ออกน้อย)'),
              el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}},cold),
            ]),
          ]),
        ]),
      ]),
    ]));
  }

  /* recent timeline */
  {
    const recentRow = el('div',{class:'hscroll',style:{display:'flex',gap:'10px',overflowX:'auto',paddingBottom:'6px'}});
    A.draws().slice(-12).reverse().forEach(d=>{
      recentRow.appendChild(el('div',{style:{flex:'0 0 auto',width:'94px',background:cT.soft,borderRadius:'16px',padding:'11px',textAlign:'center'}},[
        el('div',{style:{fontSize:'11px',color:'#a9a2b8'}},A.short(d.ts)),
        el('div',{style:{fontWeight:'600',fontSize:'23px',marginTop:'5px',color:cT.deep}},A.pad(d.top)),
        el('div',{style:{fontSize:'10px',color:'#b3adc0',marginTop:'4px'}},'ล่าง'),
        el('div',{style:{fontWeight:'500',fontSize:'16px',color:'#7c7690'}},A.pad(d.bottom)),
      ]));
    });
    detail.appendChild(el('div',{style:{background:'#fff',borderRadius:'24px',padding:'20px',boxShadow:'0 12px 32px rgba(60,40,100,.06)',border:'1px solid rgba(40,30,60,.05)',marginBottom:'18px'}},[
      el('h3',{style:{fontWeight:'600',fontSize:'18px',margin:'0 0 14px'}},'ผลย้อนหลังล่าสุด'),
      recentRow,
    ]));
  }

  /* disclaimer */
  detail.appendChild(el('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start',background:'rgba(255,255,255,.55)',border:'1px dashed rgba(40,30,60,.14)',borderRadius:'16px',padding:'14px 16px',fontSize:'12px',color:'#8a8499',lineHeight:'1.6',marginTop:'22px'}},[
    el('span',{},'⚠️'),
    el('span',{html: real
      ? 'ตัวเลขคำนวณจาก<strong style="color:#6c6680">ผลหวยลาวจริง</strong>ที่ดึงสะสมไว้ • ช่วงแรกที่งวดยังน้อย เปอร์เซ็นต์จะแกว่งมาก กดอัปเดตทุกวันเพื่อสะสมข้อมูล • สถิติในอดีตไม่รับประกันผลในอนาคต โปรดเล่นอย่างมีสติ'
      : 'ขณะนี้เป็น<strong style="color:#6c6680">ข้อมูลตัวอย่าง</strong> กด “อัปเดตผลจริง” เพื่อดึงผลหวยลาวจริง • สถิติในอดีตไม่รับประกันผลในอนาคต โปรดเล่นอย่างมีสติและพอประมาณ'}),
  ]));

  wrap.appendChild(detail);
}

App._ensure();
App.applyPreset('all');  // ตั้งช่วงวันที่เริ่มต้นให้ตรงกับข้อมูลจริง แล้ว render
</script>
</body>
</html>
